<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>LOGIN HERE</h1>
        </div>

        <form id="loginForm" action="login.html" method="POST">
            <div class="form-group">
                <label for="email">Enter Your Email</label>
                <input type="text" id="email" name="username" class="input-field" placeholder="Enter Username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="forgot-password.html" class="forgot-link">Forget Password?</a>
        </div>

        <div class="register-text">
            Not Yet A Member ? 
            <a href="register.html" class="register-link">Register Here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            if (document.getElementById('email').value.trim() === '' || 
                document.getElementById('password').value.trim() === '') {
                e.preventDefault();
                alert("Please fill in all fields");
            }
        });
    </script>
</body>
</html>
